<!DOCTYPE html>
<html>
<head>
 <title>
  {% if page.title %}
    {{ page.title }} | {{ site.title }}
  {% else %}
    {{ site.title }}
  {% endif %}
</title>
  <link rel="stylesheet" href="/assets/css/style.css">

  <link rel="icon" type="image/png" href="https://i.imgur.com/AzRn7Wg.png">
  <link rel="shortcut icon" href="https://i.imgur.com/AzRn7Wg.png">
</head>
<body>

<nav class="site-nav">

  <div class="nav-left">
  <a href="/">
    <img src="https://i.imgur.com/AzRn7Wg.png" class="nav-logo">
    greenborough
  </a>
</div>

  <div class="nav-right">

        <a href="/characters/">Characters</a>


    <a href="/worldbuilding/">World</a>

    <a href="/stories/">Writing</a>

    <a href="/about/">About</a>

  </div>

</nav>

{{ content }}

</body>
</html>



<style>
  .site-nav {
    position: sticky;
    top: 0;
    z-index: 999;

    display: flex;
    justify-content: space-between;
    align-items: center;

    padding: 15px 20px;

    background: var(--g3);
}

.site-nav a {
    color: white;
    text-decoration: none;
}

.nav-left a {
    display: flex;         /* Places the image and text side-by-side */
    align-items: center;   /* Vertically centers the icon with the text */
    gap: 10px;             /* Puts a clean 10px space between the icon and text */
    
    font-size: 24px;
    font-family: var(--headerfont);
    text-transform: lowercase;
    letter-spacing: 1px;
}

/* Style the logo size specifically so it fits beautifully in the nav bar */
.nav-logo {
    width: 25px;           /* Adjust this size depending on your header height */
    height: 25px;          
    object-fit: contain;   /* Ensures the image doesn't distort */
}

.nav-right {
    display: flex;
    gap: 20px;
    align-items: center;
}
  
  .nav-right a {
        font-size: 13px;
    font-family: var(--subtitlefont);
    font-weight: 700px;
    text-transform: uppercase;
    letter-spacing: 1px;
    
  }


</style>
